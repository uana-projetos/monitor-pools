<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="100%" style="stop-color:#0d1528"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b9eff"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid lines subtle -->
  <g stroke="rgba(59,158,255,0.06)" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Glow circle -->
  <circle cx="600" cy="315" r="280" fill="rgba(59,158,255,0.04)"/>
  <circle cx="600" cy="315" r="180" fill="rgba(168,85,247,0.04)"/>

  <!-- Top bar accent -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#cyan)"/>

  <!-- Logo brain -->
  <text x="80" y="120" font-family="Arial,sans-serif" font-size="64" fill="white">🧠</text>

  <!-- App name -->
  <text x="160" y="115" font-family="Arial Black,Arial,sans-serif" font-size="72" font-weight="900" fill="white">DefiMind</text>

  <!-- Tagline -->
  <text x="80" y="170" font-family="Arial,sans-serif" font-size="28" fill="rgba(255,255,255,0.6)">Monitor DeFi completo para traders brasileiros</text>

  <!-- Feature cards row -->
  <!-- Card 1 -->
  <rect x="80" y="220" width="240" height="110" rx="12" fill="rgba(59,158,255,0.12)" stroke="rgba(59,158,255,0.3)" stroke-width="1"/>
  <text x="100" y="258" font-family="Arial,sans-serif" font-size="22" fill="white">💰 Yield</text>
  <text x="100" y="284" font-family="Arial,sans-serif" font-size="14" fill="rgba(255,255,255,0.55)">RWA, Stables ao vivo</text>
  <text x="100" y="308" font-family="Arial,sans-serif" font-size="14" fill="rgba(59,158,255,0.9)">DefiLlama Live API</text>

  <!-- Card 2 -->
  <rect x="340" y="220" width="240" height="110" rx="12" fill="rgba(168,85,247,0.12)" stroke="rgba(168,85,247,0.3)" stroke-width="1"/>
  <text x="360" y="258" font-family="Arial,sans-serif" font-size="22" fill="white">🌊 Pools</text>
  <text x="360" y="284" font-family="Arial,sans-serif" font-size="14" fill="rgba(255,255,255,0.55)">ETH, SOL, Índices</text>
  <text x="360" y="308" font-family="Arial,sans-serif" font-size="14" fill="rgba(168,85,247,0.9)">S&amp;P 500, Nasdaq</text>

  <!-- Card 3 -->
  <rect x="600" y="220" width="240" height="110" rx="12" fill="rgba(52,211,153,0.12)" stroke="rgba(52,211,153,0.3)" stroke-width="1"/>
  <text x="620" y="258" font-family="Arial,sans-serif" font-size="22" fill="white">🪂 Airdrops</text>
  <text x="620" y="284" font-family="Arial,sans-serif" font-size="14" fill="rgba(255,255,255,0.55)">8 projetos ativos</text>
  <text x="620" y="308" font-family="Arial,sans-serif" font-size="14" fill="rgba(52,211,153,0.9)">Checklist + progresso</text>

  <!-- Card 4 -->
  <rect x="860" y="220" width="260" height="110" rx="12" fill="rgba(249,115,22,0.12)" stroke="rgba(249,115,22,0.3)" stroke-width="1"/>
  <text x="880" y="258" font-family="Arial,sans-serif" font-size="22" fill="white">💸 Empréstimos</text>
  <text x="880" y="284" font-family="Arial,sans-serif" font-size="14" fill="rgba(255,255,255,0.55)">Health Factor ao vivo</text>
  <text x="880" y="308" font-family="Arial,sans-serif" font-size="14" fill="rgba(249,115,22,0.9)">Alerta de liquidação</text>

  <!-- Chain badges -->
  <rect x="80" y="368" width="90" height="28" rx="14" fill="rgba(99,126,234,0.2)" stroke="rgba(99,126,234,0.5)" stroke-width="1"/>
  <text x="125" y="387" font-family="Arial,sans-serif" font-size="13" fill="#627eea" text-anchor="middle">Ethereum</text>

  <rect x="182" y="368" width="80" height="28" rx="14" fill="rgba(153,69,255,0.2)" stroke="rgba(153,69,255,0.5)" stroke-width="1"/>
  <text x="222" y="387" font-family="Arial,sans-serif" font-size="13" fill="#9945ff" text-anchor="middle">Solana</text>

  <rect x="274" y="368" width="60" height="28" rx="14" fill="rgba(0,82,255,0.2)" stroke="rgba(0,82,255,0.5)" stroke-width="1"/>
  <text x="304" y="387" font-family="Arial,sans-serif" font-size="13" fill="#0052ff" text-anchor="middle">Base</text>

  <rect x="346" y="368" width="100" height="28" rx="14" fill="rgba(40,160,240,0.2)" stroke="rgba(40,160,240,0.5)" stroke-width="1"/>
  <text x="396" y="387" font-family="Arial,sans-serif" font-size="13" fill="#28a0f0" text-anchor="middle">Arbitrum</text>

  <rect x="458" y="368" width="120" height="28" rx="14" fill="rgba(0,212,255,0.2)" stroke="rgba(0,212,255,0.5)" stroke-width="1"/>
  <text x="518" y="387" font-family="Arial,sans-serif" font-size="13" fill="#00d4ff" text-anchor="middle">Hyperliquid</text>

  <!-- Bottom URL bar -->
  <rect x="0" y="570" width="1200" height="60" fill="rgba(0,0,0,0.4)"/>
  <text x="80" y="607" font-family="Arial,sans-serif" font-size="20" fill="rgba(255,255,255,0.4)">🔗</text>
  <text x="110" y="607" font-family="Arial,sans-serif" font-size="20" fill="rgba(255,255,255,0.7)">uana-projetos.github.io/defimind</text>
  <text x="1120" y="607" font-family="Arial,sans-serif" font-size="20" fill="rgba(59,158,255,0.8)" text-anchor="end">Gratuito · Open Source</text>
</svg>